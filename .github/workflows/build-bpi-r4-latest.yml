name: Build OpenWrt (BPI-R4, kernel 6.6, latest)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Free disk space
        run: |
          sudo apt clean
          docker rmi $(docker images -q) || true
          sudo rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo rm -rf /opt/microsoft /usr/local/lib/android /opt/az

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3-distutils python3-setuptools rsync swig unzip zlib1g-dev \
            file wget dos2unix rsync time

      - name: Run build script
        run: |
          chmod +x ./bpi-r4-openwrt-builder.sh
          ./bpi-r4-openwrt-builder.sh

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          find openwrt/bin/targets -name "*.itb" -exec cp {} artifacts/ \;
          find openwrt/bin/targets -name "*.img.gz" -exec cp {} artifacts/ \;
          find openwrt/bin/targets -name "sha256sums" -exec cp {} artifacts/ \;

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: openwrt-bpi-r4
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: bpi-r4-latest
          name: BPI-R4 manual build (latest)
          files: artifacts/*
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
